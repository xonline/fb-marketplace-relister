<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relister</title>
  <style>
    /* ── Design: OLED dark · system-Inter · green accent ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0A0F1E;
      --surface: #111827;
      --border:  #1F2D45;
      --text:    #F1F5F9;
      --muted:   #64748B;
      --dim:     #94A3B8;
      --green:   #22C55E;
      --amber:   #F59E0B;
      --red:     #EF4444;
      --blue:    #1877F2;
      --r:       10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 32px; height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(24,119,242,.3);
    }

    .header-copy { flex: 1; min-width: 0; }
    .header-copy h1 { font-size: 13px; font-weight: 700; line-height: 1.2; }
    .header-copy .ver { font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* status pill */
    .pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 8px 4px 6px;
      flex-shrink: 0;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
    }
    .dot.ready    { background: var(--green); box-shadow: 0 0 0 2px rgba(34,197,94,.2); }
    .dot.success  { background: var(--green); box-shadow: 0 0 0 2px rgba(34,197,94,.2); }
    .dot.busy     { background: var(--amber); box-shadow: 0 0 0 2px rgba(245,158,11,.2); animation: blink 1.2s ease-in-out infinite; }
    .dot.error    { background: var(--red);   box-shadow: 0 0 0 2px rgba(239,68,68,.2); }
    .pill-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .02em; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Body ── */
    .body { padding: 12px 12px 0; display: flex; flex-direction: column; gap: 8px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .card-label {
      padding: 9px 12px 0;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted);
    }

    /* ── Page state ── */
    .page-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px 12px;
    }
    .page-icon {
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .3s;
    }
    .page-icon.on  { background: rgba(34,197,94,.12); }
    .page-icon.off { background: rgba(100,116,139,.1); }
    .page-copy .title { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .page-copy .hint  { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    /* CTA */
    .cta-wrap { padding: 0 12px 12px; }
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px 14px;
      background: var(--green); color: #051010;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-decoration: none; letter-spacing: .01em;
      transition: opacity .15s, transform .1s;
    }
    .btn-primary:hover  { opacity: .88; }
    .btn-primary:active { transform: scale(.98); }

    /* ── Operation status ── */
    .op-body { padding: 8px 12px 12px; }
    .op-row  { display: flex; align-items: flex-start; gap: 8px; }
    .op-icon {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px; transition: background .3s;
    }
    .op-icon.idle    { background: rgba(100,116,139,.1); }
    .op-icon.success { background: rgba(34,197,94,.12); }
    .op-icon.busy    { background: rgba(245,158,11,.12); }
    .op-icon.error   { background: rgba(239,68,68,.12); }
    .op-text .msg { font-size: 12px; color: var(--dim); line-height: 1.45; word-break: break-word; }
    .op-text .msg.success { color: var(--green); }
    .op-text .msg.busy    { color: var(--amber); }
    .op-text .msg.error   { color: var(--red); }
    .op-text .time { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* progress steps */
    .steps-wrap { margin-top: 9px; }
    .steps-bar-bg {
      height: 2px; background: rgba(255,255,255,.06);
      border-radius: 2px; overflow: hidden;
    }
    .steps-bar-fill {
      height: 100%; background: var(--amber);
      border-radius: 2px; transition: width .4s ease;
    }
    .steps-row {
      display: flex; gap: 3px; margin-top: 6px;
      font-size: 10px; color: var(--muted);
    }
    .step { opacity: .3; transition: opacity .3s, color .3s; }
    .step.done    { opacity: 1; color: var(--green); }
    .step.current { opacity: 1; color: var(--amber); }
    .sep { opacity: .2; }

    /* ── Footer ── */
    .footer {
      padding: 10px 12px 13px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .btn-ghost {
      padding: 6px 11px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; font-size: 11px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-ghost:hover { border-color: #2D4060; color: var(--dim); }
    .btn-ghost.done  { border-color: var(--green); color: var(--green); }
    .cache-info { font-size: 10px; color: var(--muted); text-align: right; line-height: 1.5; }
    .cached   { color: var(--green); }
    .uncached { color: var(--muted); }
    .steps-bar-fill.success { background: var(--green); }
    .new-listing-link { display:block; margin-top:5px; font-size:11px; color:var(--green); text-decoration:none; opacity:.8; }
    .new-listing-link:hover { opacity:1; text-decoration:underline; }
    .stats-bar { margin-top:6px; padding:5px 0 0; font-size:10px; color:var(--muted); border-top:1px solid var(--border); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <path d="M3.5 10a6.5 6.5 0 0 1 11.18-4.5H12a.75.75 0 0 0 0 1.5h3.75c.414 0 .75-.336.75-.75V2.5a.75.75 0 0 0-1.5 0v1.94A8 8 0 1 0 18 10a.75.75 0 0 0-1.5 0A6.5 6.5 0 0 1 3.5 10z" fill="white"/>
      </svg>
    </div>
    <div class="header-copy">
      <h1>Marketplace Relister</h1>
      <div class="ver">v3.2.0 · API</div>
    </div>
    <div class="pill">
      <div class="dot" id="dot"></div>
      <span class="pill-label" id="pill-label">IDLE</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Page detection -->
    <div class="card">
      <div class="card-label">Current Page</div>
      <div class="page-row">
        <div class="page-icon off" id="page-icon">
          <svg id="page-icon-svg" width="15" height="15" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="#64748B" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="page-copy">
          <div class="title" id="page-title">Detecting…</div>
          <div class="hint"  id="page-hint"></div>
        </div>
      </div>
      <div id="cta-wrap" style="display:none" class="cta-wrap">
        <a id="cta-btn" class="btn-primary" href="#">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="none">
            <path d="M10 2a8 8 0 1 0 0 16A8 8 0 0 0 10 2zm3.28 8.53-3 3a.75.75 0 0 1-1.06-1.06L11.44 10l-2.22-2.47a.75.75 0 0 1 1.06-1.06l3 3c.14.14.22.33.22.53s-.08.38-.22.53z" fill="currentColor"/>
          </svg>
          Open My Listings
        </a>
      </div>
    </div>

    <!-- Last operation -->
    <div class="card">
      <div class="card-label">Last Operation</div>
      <div class="op-body">
        <div class="op-row">
          <div class="op-icon idle" id="op-icon">
            <svg id="op-icon-svg" width="13" height="13" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="7" stroke="#64748B" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="op-text">
            <div class="msg idle" id="op-msg" aria-live="polite">No activity yet</div>
            <div class="time" id="op-time"></div>
            <a id="new-listing-link" class="new-listing-link" href="#" target="_blank" style="display:none">↗ View new listing</a>
          </div>
        </div>
        <div id="stats-bar" class="stats-bar" style="display:none"></div>
        <div class="steps-wrap" id="steps-wrap" style="display:none">
          <div class="steps-bar-bg">
            <div class="steps-bar-fill" id="steps-bar" style="width:0%"></div>
          </div>
          <div class="steps-row">
            <span class="step" id="s0">Load</span>
            <span class="sep">›</span>
            <span class="step" id="s1">Read</span>
            <span class="sep">›</span>
            <span class="step" id="s2">Post</span>
            <span class="sep">›</span>
            <span class="step" id="s3">Delete</span>
            <span class="sep">›</span>
            <span class="step" id="s4">Done</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-ghost" id="btn-clear">Clear Cache</button>
    <div class="cache-info" id="cache-info"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
