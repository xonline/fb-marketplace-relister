<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FB Marketplace Relister</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c1e21;
      color: #e4e6ea;
      width: 320px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #1877f2;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    .card {
      background: #242526;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #b0b3b8;
      margin-bottom: 4px;
    }

    .value {
      font-size: 20px;
      font-weight: 700;
      color: #e4e6ea;
    }

    .status-text {
      font-size: 13px;
      color: #b0b3b8;
      min-height: 20px;
      word-break: break-word;
    }

    .progress-bar-wrap {
      background: #3a3b3c;
      border-radius: 4px;
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 6px;
      background: #1877f2;
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-label {
      font-size: 11px;
      color: #b0b3b8;
      margin-top: 4px;
      text-align: right;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-relist {
      background: #1877f2;
      color: #fff;
    }

    #btn-cancel {
      background: #3a3b3c;
      color: #e4e6ea;
      display: none;
    }

    .schedule-section { margin-top: 4px; }

    .schedule-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .schedule-row label {
      font-size: 13px;
      color: #e4e6ea;
      white-space: nowrap;
    }

    .schedule-row input[type="time"] {
      background: #3a3b3c;
      border: 1px solid #4e4f50;
      border-radius: 4px;
      color: #e4e6ea;
      padding: 4px 8px;
      font-size: 13px;
      flex: 1;
    }

    #btn-schedule-toggle {
      background: #3a3b3c;
      color: #e4e6ea;
      font-size: 13px;
      padding: 8px;
    }

    #schedule-status {
      font-size: 11px;
      color: #b0b3b8;
      text-align: center;
    }

    .divider {
      height: 1px;
      background: #3a3b3c;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>FB Marketplace Relister</h1>

  <div class="card">
    <div class="label">Listings Detected</div>
    <div class="value" id="listing-count">—</div>
  </div>

  <div class="card">
    <div class="label">Status</div>
    <div class="status-text" id="status-text">Loading...</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label"></div>
  </div>

  <button id="btn-relist">Relist All Now</button>
  <button id="btn-cancel">Cancel</button>

  <div class="divider"></div>

  <div class="card schedule-section">
    <div class="label">Daily Auto-Relist</div>
    <div class="schedule-row" style="margin-top:8px;">
      <label for="schedule-time">Time</label>
      <input type="time" id="schedule-time" value="09:00" />
    </div>
    <button id="btn-schedule-toggle">Enable Schedule</button>
    <div id="schedule-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
