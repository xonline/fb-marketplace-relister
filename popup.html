<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FB Marketplace Relister</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c1e21;
      color: #e4e6ea;
      width: 300px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #1877f2;
      margin-bottom: 4px;
    }

    .version {
      font-size: 11px;
      color: #b0b3b8;
      margin-bottom: 14px;
    }

    .card {
      background: #242526;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #b0b3b8;
      margin-bottom: 6px;
    }

    .status-text {
      font-size: 13px;
      color: #e4e6ea;
      word-break: break-word;
      min-height: 18px;
    }

    .hint {
      font-size: 12px;
      color: #b0b3b8;
      line-height: 1.5;
    }

    .hint strong { color: #e4e6ea; }

    a.open-link {
      display: block;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #1877f2;
      text-decoration: none;
      border-radius: 6px;
      padding: 9px;
      margin-bottom: 8px;
      transition: opacity 0.15s;
    }
    a.open-link:hover { opacity: 0.88; }

    button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }

    #btn-clear-cache {
      background: #3a3b3c;
      color: #b0b3b8;
    }

    #btn-clear-cache.done {
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <h1>FB Marketplace Relister</h1>
  <div class="version">v2.1.0 — Direct API mode</div>

  <div class="card">
    <div class="label">Last Status</div>
    <div class="status-text" id="status-text">Ready</div>
  </div>

  <div class="card">
    <div class="hint">
      <strong>Relist</strong> buttons appear on each listing card on your selling page.
      Click one to delete &amp; re-post that item instantly via Facebook's API.
    </div>
  </div>

  <a id="link-open-listings" class="open-link" href="#">Open My Listings Page</a>

  <button id="btn-clear-cache">Clear Token Cache</button>

  <script src="popup.js"></script>
</body>
</html>
